<script>
function renderOrderSummary() {
  const cart = JSON.parse(localStorage.getItem("lustrevault_cart")) || [];
  const container = document.getElementById("orderItems");
  const subtotalEl = document.getElementById("subtotal");
  const totalEl = document.getElementById("total");
  const btn = document.getElementById("checkoutBtn");
  const i18n = window.__i18n;
  const t = (key) => i18n?.t(key) ?? key;

  if (cart.length === 0) {
    container.innerHTML = '<p style="color:#666;text-align:center;padding:20px 0;">閺嗗倹妫ら崯鍡楁惂</p>';
    if (subtotalEl) subtotalEl.textContent = "妤?.00";
    if (totalEl) totalEl.textContent = "妤?.00";
    if (btn) btn.disabled = true;
    return;
  }
  if (btn) btn.disabled = false;

  container.innerHTML = cart.map(item => `
    <div class="order-item">
      <div class="order-item-image">${item.icon || "棣冩憹"}</div>
      <div class="order-item-info">
        <div style="font-weight:600;">${item.name} 鑴?${item.qty}</div>
        <div class="order-item-price">妤?{(item.price * item.qty).toFixed(2)}</div>
      </div>
    </div>
  `).join("");

  const subtotal = cart.reduce((s, item) => s + item.price * item.qty, 0);
  if (subtotalEl) subtotalEl.textContent = `妤?{subtotal.toFixed(2)}`;
  if (totalEl) totalEl.textContent = `妤?{subtotal.toFixed(2)}`;
}

// 閸掑洦宕查弨顖欑帛閺傜懓绱￠弮鑸垫纯閺傜増瀵滈柦顔芥瀮鐎?document.querySelectorAll('input[name="payment"]').forEach(input => {
  input.addEventListener("change", function() {
    const btn = document.getElementById("checkoutBtn");
    if (this.value === "paypal") {
      btn.innerHTML = "棣冩尩 娴ｈ法鏁?PayPal 閺€顖欑帛";
    } else {
      btn.innerHTML = "棣冩尭 娴ｈ法鏁?Stripe 閺€顖欑帛";
    }
  });
});

async function handleCheckout() {
  const firstName = document.getElementById("firstName")?.value.trim();
  const lastName = document.getElementById("lastName")?.value.trim();
  const email = document.getElementById("email")?.value.trim();
  const phone = document.getElementById("phone")?.value.trim();
  const address = document.getElementById("address")?.value.trim();
  const city = document.getElementById("city")?.value.trim();
  const zip = document.getElementById("zip")?.value.trim();
  const i18n = window.__i18n;
  const t = (key, vars) => i18n?.t(key, vars) ?? key;

  if (!firstName || !lastName || !email || !phone || !address || !city || !zip) {
    showToast("閳跨媴绗?鐠囧嘲锝為崘娆愬閺堝绻€婵夘偄鐡у▓?);
    return;
  }

  const cart = JSON.parse(localStorage.getItem("lustrevault_cart")) || [];
  if (cart.length === 0) {
    showToast("閳跨媴绗?鐠愵厾澧挎潪锔胯礋缁?);
    return;
  }

  const payment = document.querySelector('input[name="payment"]:checked');
  const paymentMethod = payment ? payment.value : "paypal";

  const btn = document.getElementById("checkoutBtn");
  btn.disabled = true;
  btn.innerHTML = "閳?婢跺嫮鎮婃稉?..";

  try {
    if (paymentMethod === "paypal") {
      // 鐠嬪啰鏁?PayPal API
      const res = await fetch("/api/create-paypal-order", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          items: cart,
          customer: { email, name: `${firstName} ${lastName}` }
        }),
      });
      const data = await res.json();
      if (data.url) {
        // 娣囨繂鐡ㄧ拋銏犲礋娣団剝浼呴崚?sessionStorage閿涘本鏁禒妯诲灇閸旂喖銆夐崣顖欎簰娴ｈ法鏁?        sessionStorage.setItem("pending_order", JSON.stringify({
          name: `${firstName} ${lastName}`,
          email,
          method: "paypal"
        }));
        window.location.href = data.url;
      } else {
        showToast("閳跨媴绗?PayPal 閺堝秴濮熷鍌氱埗閿涘矁顕粙宥呮倵闁插秷鐦?);
        btn.disabled = false;
        btn.innerHTML = "棣冩尩 娴ｈ法鏁?PayPal 閺€顖欑帛";
      }
    } else {
      // Stripe 閺€顖欑帛
      const res = await fetch("/api/create-checkout-session", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          items: cart,
          customer: { email, name: `${firstName} ${lastName}` }
        }),
      });
      const data = await res.json();
      if (data.url) {
        window.location.href = data.url;
      } else {
        showToast("閳跨媴绗?閺€顖欑帛閺堝秴濮熷鍌氱埗");
        btn.disabled = false;
        btn.innerHTML = "棣冩尭 娴ｈ法鏁?Stripe 閺€顖欑帛";
      }
    }
  } catch (err) {
    showToast("閳跨媴绗?缂冩垹绮堕柨娆掝嚖閿涘矁顕柌宥堢槸");
    btn.disabled = false;
    btn.innerHTML = paymentMethod === "paypal" ? "棣冩尩 娴ｈ法鏁?PayPal 閺€顖欑帛" : "棣冩尭 娴ｈ法鏁?Stripe 閺€顖欑帛";
  }
}

// 閻╂垵鎯夌拠顓♀枅閸掑洦宕?document.addEventListener("langchange", function() {
  renderOrderSummary();

    for (let i = 0; i < countrySelect.options.length; i++) {
      countrySelect.options[i].textContent = window.__i18n.t(`checkout.countries.${i}`);
    }
  }
});


</script>
