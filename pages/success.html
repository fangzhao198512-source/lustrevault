<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-i18n="success.title">支付成功 — LustreVault</title>
  <link rel="stylesheet" href="../css/style.css">
  <style>
    .success-page { text-align: center; padding: 100px 20px; max-width: 600px; margin: 0 auto; }
    .success-icon { font-size: 5rem; margin-bottom: 20px; }
    .success-page h1 { font-size: 2rem; margin-bottom: 15px; color: #06d6a0; }
    .success-page p { color: #666; line-height: 1.8; margin-bottom: 10px; }
    .order-details { background: #f8f9fa; border-radius: 12px; padding: 25px; margin: 30px 0; text-align: left; }
    .order-details h3 { margin-bottom: 15px; }
  </style>
</head>
<body>
  <header>
    <div class="header-inner">
      <a href="../index.html" class="logo" data-i18n="brand">LustreVault</a>
      <nav>
        <ul>
          <li><a href="../index.html" data-i18n="nav.home">首页</a></li>
          <li><a href="../index.html#products" data-i18n="nav.products">所有产品</a></li>
          <li><a href="../index.html#categories" data-i18n="nav.categories">分类</a></li>
          <li><a href="checkout.html" data-i18n="nav.checkout">结算</a></li>
        </ul>
      </nav>
      <div class="header-actions">
        <div class="lang-switcher">
          <select class="lang-select" onchange="window.__i18n.setLang(this.value)" style="padding:6px 10px;border-radius:8px;border:1px solid var(--gray-300);background:var(--white);font-size:0.85rem;cursor:pointer;">
            <option value="zh">中文</option>
            <option value="en">EN</option>
            <option value="ja">日本語</option>
          </select>
        </div>
      </div>
    </div>
  </header>

  <div class="success-page">
    <div class="success-icon">🎉</div>
    <h1 data-i18n="success.title">支付成功！</h1>
    <p data-i18n="success.message">感谢你的购买！我们会尽快为你安排发货。<br>订单确认邮件将发送到你的邮箱。</p>
    <div class="order-details">
      <h3 data-i18n="checkout.orderSummary">📋 订单信息</h3>
      <p><span data-i18n="success.orderId">订单编号</span>：<strong id="orderId"></strong></p>
      <p><span data-i18n="success.paymentMethod">支付方式</span>：<span data-i18n="success.paymentValue">信用卡 (Stripe)</span></p>
      <p><span data-i18n="success.shipping">预计配送</span>：<span data-i18n="success.shippingValue">3-7 个工作日</span></p>
      <p data-i18n="success.privacyNote">🔒 我们严格保护你的隐私，发货为中性包装</p>
    </div>
    <a href="../index.html" class="btn btn-primary" data-i18n="success.continue">继续购物</a>
  </div>

  <script src="../js/i18n.js"></script>
  <script src="../js/i18n-loader.js"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    const sessionId = params.get("session_id") || "";
    document.getElementById("orderId").textContent = sessionId.slice(-12).toUpperCase() || "----";
    localStorage.removeItem("lustrevault_cart");

    // 更新语言
    const checkI18n = setInterval(() => {
      if (window.__i18n && Object.keys(window.__i18n._data).length > 0) {
        clearInterval(checkI18n);
        window.__i18n.apply();
      }
    }, 100);
  </script>
</body>
</html>
